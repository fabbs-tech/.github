name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you expected vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Board, toolchain version, OS, branch, commit — whatever is relevant.
    validations:
      required: false